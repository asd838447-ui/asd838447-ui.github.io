<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GraphPro 3.0 — Интеллектуальный График</title>
    <style>
        :root {
            --bg: #0f0f13;
            --card: rgba(30, 30, 40, 0.75);
            --primary: #8257e5;
            --accent: #00f2ff;
            --text: #e1e1e6;
            --danger: #ff5555;
            --glass: rgba(255, 255, 255, 0.08);
            --grid: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #2a1b4d 0%, var(--bg) 60%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        
        h1 { 
            font-size: 1.8rem; margin: 0; 
            background: linear-gradient(90deg, var(--accent), var(--primary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .input-group { display: flex; gap: 10px; margin-top: 20px; }

        input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 5px 15px rgba(130, 87, 229, 0.4); }
        .btn-secondary { background: #2a2a35; }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

        .canvas-container {
            position: relative;
            background: #050508;
            border-radius: 20px;
            border: 1px solid var(--glass);
            overflow: hidden;
            height: 550px;
            cursor: crosshair;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .stats-panel { display: flex; flex-direction: column; gap: 15px; }

        .stat-card {
            background: var(--card);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--glass);
        }

        .stat-card h4 { margin: 0 0 12px 0; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }

        .layer-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-family: monospace;
            border-left: 4px solid;
        }

        /* Tooltip для курсора */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            pointer-events: none;
            border: 1px solid var(--glass);
            display: none;
            z-index: 10;
            white-space: nowrap;
        }
        
        .tooltip-row { margin: 2px 0; }
        .formula-help { font-size: 0.85rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <div class="header-flex">
            <h1>GraphPro 3.0</h1>
            <div id="status" style="font-size: 0.9rem; color: #aaa;">Движок активен</div>
        </div>
        
        <div class="input-group">
            <input type="text" id="formulaInput" placeholder="Например: sin(x) + cos(x) или e^(-x^2)" value="sin(x)">
            <button class="btn" onclick="app.addLayer()">Построить</button>
            <button class="btn btn-secondary" onclick="app.clear()">Очистить</button>
        </div>
        <div class="formula-help">Поддерживается: + - * / ^ ( ) sin, cos, tan, log, exp, abs, sqrt. Константы: pi, e.</div>
    </div>

    <div class="main-layout">
        <div class="canvas-container" id="canvasBox">
            <canvas id="graphCanvas"></canvas>
            <div id="tooltip"></div>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <h4>Активные графики</h4>
                <div id="layersList"></div>
            </div>

            <div class="stat-card">
                <h4>Анализ текущего вида</h4>
                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 10px;" onclick="app.calculateArea()">∑ Площадь (Интеграл)</button>
                <div id="analysis-result" style="font-family: monospace; color: var(--accent); font-size: 0.9rem;"></div>
            </div>

            <div class="stat-card">
                <h4>Навигация</h4>
                <p style="font-size: 0.85rem; color: #aaa; margin-top: 0;">Колесико — масштаб. ЛКМ — перемещение.</p>
                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 10px;" onclick="app.resetView()">Сбросить вид</button>
                <button class="btn" style="width: 100%;" onclick="app.export()">Скачать PNG</button>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Улучшенный парсер: понимает константы и математические функции
 */
const SmartParser = {
    prepare(str) {
        let s = str.toLowerCase().replace(/\s+/g, '');
        
        // Константы
        s = s.replace(/\bpi\b/g, 'Math.PI');
        s = s.replace(/\be\b/g, 'Math.E');
        
        // Скрытое умножение: 2x -> 2*x, 2sin -> 2*sin
        s = s.replace(/(\d)([a-z\(])/g, '$1*$2');
        
        // Степени: x^2 -> Math.pow(x,2) (простая реализация)
        while (s.includes('^')) {
            s = s.replace(/([a-zA-Z0-9\.]+)\^([a-zA-Z0-9\.\-]+)/g, 'Math.pow($1,$2)');
        }
        
        // Функции
        const mathFuncs = ['sin', 'cos', 'tan', 'sqrt', 'abs', 'exp', 'log', 'atan', 'acos', 'asin'];
        mathFuncs.forEach(fn => {
            const regex = new RegExp(`\\b${fn}\\(`, 'g');
            s = s.replace(regex, `Math.${fn}(`);
        });
        
        return s;
    },
    
    compile(formula) {
        try {
            const body = this.prepare(formula);
            // Проверка, что функция возвращает число
            const fn = new Function('x', `try { return ${body}; } catch(e) { return NaN; }`);
            fn(1); // Тестовый запуск
            return fn;
        } catch (e) {
            return null;
        }
    }
};

const app = {
    canvas: document.getElementById('graphCanvas'),
    ctx: null,
    layers: [],
    zoom: 40,
    offset: { x: 0, y: 0 },
    mouse: { x: null, y: null, worldX: 0, worldY: 0 },
    isDragging: false,
    tooltip: document.getElementById('tooltip'),
    
    // Палитра киберпанк/неон
    colors: ['#00f2ff', '#ff007f', '#a200ff', '#00ff88', '#ffaa00'],

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        this.canvas.addEventListener('wheel', (e) => this.handleWheel(e));
        this.canvas.addEventListener('mousedown', () => { this.isDragging = true; this.canvas.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { this.isDragging = false; this.canvas.style.cursor = 'crosshair'; });
        this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        this.canvas.addEventListener('mouseleave', () => { this.mouse.x = null; this.tooltip.style.display = 'none'; this.scheduleRender(); });

        // Добавим график по умолчанию
        document.getElementById('formulaInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.addLayer();
        });
        
        this.addLayer("sin(x)");
    },

    resize() {
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.canvas.width = rect.width;
        this.canvas.height = rect.height;
        this.scheduleRender();
    },

    addLayer(presetFormula) {
        const input = document.getElementById('formulaInput');
        const fText = presetFormula || input.value;
        if (!fText) return;

        const fn = SmartParser.compile(fText);
        if (fn) {
            const color = this.colors[this.layers.length % this.colors.length];
            this.layers.push({ id: Date.now(), text: fText, fn, color });
            this.updateUI();
            this.scheduleRender();
            if (!presetFormula) input.value = ''; // Очищаем поле при ручном вводе
        } else {
            alert("Ошибка в синтаксисе формулы.");
        }
    },

    removeLayer(id) {
        this.layers = this.layers.filter(l => l.id !== id);
        this.updateUI();
        this.scheduleRender();
    },

    clear() {
        this.layers = [];
        this.updateUI();
        document.getElementById('analysis-result').innerText = '';
        this.scheduleRender();
    },

    updateUI() {
        const list = document.getElementById('layersList');
        if (this.layers.length === 0) {
            list.innerHTML = '<div style="color:#666; font-size:0.9rem;">Нет графиков</div>';
            return;
        }
        list.innerHTML = this.layers.map(l => `
            <div class="layer-item" style="border-color: ${l.color}">
                <code style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">y = ${l.text}</code>
                <button onclick="app.removeLayer(${l.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;">×</button>
            </div>
        `).join('');
    },

    toWorld(screenX, screenY) {
        return {
            x: (screenX - this.canvas.width / 2 - this.offset.x) / this.zoom,
            y: (this.canvas.height / 2 - screenY + this.offset.y) / this.zoom
        };
    },

    toScreen(worldX, worldY) {
        return {
            x: worldX * this.zoom + this.canvas.width / 2 + this.offset.x,
            y: this.canvas.height / 2 - worldY * this.zoom + this.offset.y
        };
    },

    handleWheel(e) {
        e.preventDefault();
        const zoomSpeed = 0.1;
        const delta = Math.sign(e.deltaY) * -zoomSpeed;
        const newZoom = this.zoom * (1 + delta);
        
        // Ограничение масштаба
        if (newZoom > 5 && newZoom < 2000) {
            // Зумирование относительно курсора
            const mouseWorldBefore = this.toWorld(this.mouse.x || this.canvas.width/2, this.mouse.y || this.canvas.height/2);
            this.zoom = newZoom;
            const mouseWorldAfter = this.toWorld(this.mouse.x || this.canvas.width/2, this.mouse.y || this.canvas.height/2);
            
            this.offset.x += (mouseWorldAfter.x - mouseWorldBefore.x) * this.zoom;
            this.offset.y -= (mouseWorldAfter.y - mouseWorldBefore.y) * this.zoom;
            
            this.scheduleRender();
        }
    },

    handleMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        this.mouse.x = e.clientX - rect.left;
        this.mouse.y = e.clientY - rect.top;

        if (this.isDragging) {
            this.offset.x += e.movementX;
            this.offset.y += e.movementY;
        }

        const world = this.toWorld(this.mouse.x, this.mouse.y);
        this.mouse.worldX = world.x;
        this.mouse.worldY = world.y;

        this.scheduleRender();
    },

    drawGrid() {
        const { ctx, canvas, zoom } = this;
        // Динамический шаг сетки в зависимости от зума
        let step = 1;
        if (zoom > 150) step = 0.2;
        if (zoom < 20) step = 5;
        if (zoom < 5) step = 20;

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 1;

        const leftWorld = this.toWorld(0, 0).x;
        const rightWorld = this.toWorld(canvas.width, 0).x;
        const topWorld = this.toWorld(0, 0).y;
        const bottomWorld = this.toWorld(0, canvas.height).y;

        const startX = Math.floor(leftWorld / step) * step;
        const startY = Math.floor(bottomWorld / step) * step;

        ctx.beginPath();
        for (let x = startX; x <= rightWorld; x += step) {
            const sx = this.toScreen(x, 0).x;
            ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height);
        }
        for (let y = startY; y <= topWorld; y += step) {
            const sy = this.toScreen(0, y).y;
            ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy);
        }
        ctx.stroke();

        // Главные оси
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 2;
        const origin = this.toScreen(0, 0);
        ctx.beginPath();
        if (origin.y >= 0 && origin.y <= canvas.height) {
            ctx.moveTo(0, origin.y); ctx.lineTo(canvas.width, origin.y);
        }
        if (origin.x >= 0 && origin.x <= canvas.width) {
            ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, canvas.height);
        }
        ctx.stroke();

        // Подписи осей
        ctx.fillStyle = '#888';
        ctx.font = '12px monospace';
        if (origin.y >= 0 && origin.y <= canvas.height) {
            for (let x = startX; x <= rightWorld; x += step) {
                if (x !== 0) ctx.fillText(parseFloat(x.toFixed(2)), this.toScreen(x, 0).x + 5, origin.y + 15);
            }
        }
    },

    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawGrid();

        // Отрисовка графиков
        this.layers.forEach(layer => {
            this.ctx.beginPath();
            this.ctx.strokeStyle = layer.color;
            this.ctx.lineWidth = 2.5;

            let first = true;
            let prevScreenY = 0;

            for (let screenX = 0; screenX <= this.canvas.width; screenX += 2) {
                const worldX = this.toWorld(screenX, 0).x;
                const worldY = layer.fn(worldX);
                const screenY = this.toScreen(0, worldY).y;

                if (isNaN(screenY)) {
                    first = true;
                    continue;
                }

                // Защита от рисования асимптот (если Y скакнул слишком далеко за 1 пиксель)
                if (!first && Math.abs(screenY - prevScreenY) > this.canvas.height) {
                    first = true;
                }

                if (first) {
                    this.ctx.moveTo(screenX, screenY);
                    first = false;
                } else {
                    this.ctx.lineTo(screenX, screenY);
                }
                prevScreenY = screenY;
            }
            this.ctx.stroke();
        });

        // Smart Cursor (Магнитные точки)
        if (this.mouse.x !== null && !this.isDragging) {
            this.drawTrackers();
        }
    },

    drawTrackers() {
        const wX = this.mouse.worldX;
        const sX = this.mouse.x;
        
        // Вертикальная линия курсора
        this.ctx.beginPath();
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        this.ctx.lineWidth = 1;
        this.ctx.moveTo(sX, 0);
        this.ctx.lineTo(sX, this.canvas.height);
        this.ctx.stroke();

        let tooltipHTML = `<div style="border-bottom:1px solid #444; padding-bottom:4px; margin-bottom:4px;">x = ${wX.toFixed(3)}</div>`;
        let hasPoints = false;

        this.layers.forEach(layer => {
            const wY = layer.fn(wX);
            if (!isNaN(wY)) {
                const sY = this.toScreen(0, wY).y;
                
                // Рисуем кружок на графике
                if (sY >= 0 && sY <= this.canvas.height) {
                    this.ctx.beginPath();
                    this.ctx.fillStyle = layer.color;
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2;
                    this.ctx.arc(sX, sY, 5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.stroke();
                }

                tooltipHTML += `<div class="tooltip-row" style="color: ${layer.color}">y = ${wY.toFixed(3)}</div>`;
                hasPoints = true;
            }
        });

        if (hasPoints) {
            this.tooltip.innerHTML = tooltipHTML;
            this.tooltip.style.display = 'block';
            
            // Позиционируем тултип, чтобы не уходил за экран
            let tipX = this.mouse.x + 15;
            let tipY = this.mouse.y + 15;
            
            if (tipX + this.tooltip.offsetWidth > this.canvas.width) tipX = this.mouse.x - this.tooltip.offsetWidth - 15;
            if (tipY + this.tooltip.offsetHeight > this.canvas.height) tipY = this.mouse.y - this.tooltip.offsetHeight - 15;
            
            this.tooltip.style.left = tipX + 'px';
            this.tooltip.style.top = tipY + 'px';
        } else {
            this.tooltip.style.display = 'none';
        }
    },

    scheduleRender() {
        if (!this.renderPending) {
            this.renderPending = true;
            requestAnimationFrame(() => {
                this.render();
                this.renderPending = false;
            });
        }
    },

    calculateArea() {
        if (this.layers.length === 0) {
            document.getElementById('analysis-result').innerText = 'Нет графиков для расчета';
            return;
        }

        const layer = this.layers[this.layers.length - 1]; // Берем последний добавленный
        const left = this.toWorld(0, 0).x;
        const right = this.toWorld(this.canvas.width, 0).x;
        
        // Метод прямоугольников для интегрирования
        const steps = 1000;
        const dx = (right - left) / steps;
        let sum = 0;
        
        for (let i = 0; i < steps; i++) {
            const x = left + i * dx + dx / 2;
            const y = layer.fn(x);
            if (!isNaN(y)) sum += y * dx;
        }
        
        document.getElementById('analysis-result').innerHTML = `
            <div>Интеграл на видимом участке:</div>
            <div style="color: white; margin-top: 5px;">∫ ${layer.text} dx ≈ ${sum.toFixed(4)}</div>
            <div style="color: #666; font-size: 0.8rem;">(От x=${left.toFixed(1)} до x=${right.toFixed(1)})</div>
        `;
    },

    resetView() {
        this.zoom = 40;
        this.offset = { x: 0, y: 0 };
        this.scheduleRender();
    },

    export() {
        // Создаем временный канвас с непрозрачным фоном для сохранения
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = this.canvas.width;
        tmpCanvas.height = this.canvas.height;
        const tCtx = tmpCanvas.getContext('2d');
        
        tCtx.fillStyle = '#050508';
        tCtx.fillRect(0, 0, tmpCanvas.width, tmpCanvas.height);
        tCtx.drawImage(this.canvas, 0, 0);
        
        const link = document.createElement('a');
        link.download = 'graphpro_export.png';
        link.href = tmpCanvas.toDataURL('image/png');
        link.click();
    }
};

app.init();
</script>
</body>
</html>
