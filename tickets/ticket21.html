<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphPro 4.0 — Ультимативный График</title>
    <style>
        :root {
            --bg: #09090b;
            --card: rgba(20, 20, 25, 0.85);
            --primary: #3b82f6;
            --accent: #10b981;
            --text: #f4f4f5;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
            color: var(--text);
            margin: 0; padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(90deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .input-group { display: flex; gap: 12px; margin-top: 20px; }

        input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid #3f3f46;
            border-radius: 10px;
            padding: 14px 20px;
            color: white;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .btn {
            background: var(--primary); color: white; border: none; padding: 0 24px; border-radius: 10px;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-secondary { background: #27272a; }
        .btn-secondary:hover { background: #3f3f46; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

        .canvas-container {
            position: relative; background: #000; border-radius: 16px;
            border: 1px solid var(--glass); overflow: hidden; height: 600px; cursor: crosshair;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--glass); margin-bottom: 20px; }
        .stat-card h4 { margin: 0 0 15px 0; color: #a1a1aa; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .layer-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px;
            margin-bottom: 8px; font-family: monospace; border-left: 4px solid;
        }

        #tooltip {
            position: absolute; background: rgba(9, 9, 11, 0.9); color: #fff; padding: 10px 14px;
            border-radius: 8px; font-family: monospace; font-size: 0.9rem; pointer-events: none;
            border: 1px solid var(--glass); display: none; z-index: 10; white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .tooltip-row { margin: 4px 0; }
        .tangent-info { font-size: 0.8rem; color: #a1a1aa; margin-left: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>GraphPro 4.0</h1>
            <span style="font-size: 0.85rem; color: #6ee7b7; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px;">Автосохранение включено</span>
        </div>
        
        <div class="input-group">
            <input type="text" id="formulaInput" placeholder="Например: e^(-x) * sin(5*x)" value="">
            <button class="btn" onclick="app.addLayer()">Добавить</button>
            <button class="btn btn-danger" onclick="app.clear()">Очистить всё</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="canvas-container" id="canvasBox">
            <canvas id="graphCanvas"></canvas>
            <div id="tooltip"></div>
        </div>

        <div>
            <div class="stat-card">
                <h4>Функции (Layers)</h4>
                <div id="layersList"></div>
            </div>

            <div class="stat-card">
                <h4>Управление и Анализ</h4>
                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 10px;" onclick="app.resetView()">Сбросить масштаб</button>
                <div style="font-size: 0.85rem; color: #71717a; margin-top: 15px; line-height: 1.5;">
                    • <b>Скролл:</b> Масштаб (Зум)<br>
                    • <b>ЛКМ + Движение:</b> Перемещение<br>
                    • <b>Наведение:</b> Значения и касательная (производная)
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const SmartParser = {
    prepare(str) {
        let s = str.toLowerCase().replace(/\s+/g, '');
        s = s.replace(/\bpi\b/g, 'Math.PI').replace(/\be\b/g, 'Math.E');
        s = s.replace(/(\d)([a-z\(])/g, '$1*$2');
        while (s.includes('^')) s = s.replace(/([a-zA-Z0-9\.]+)\^([a-zA-Z0-9\.\-]+)/g, 'Math.pow($1,$2)');
        ['sin', 'cos', 'tan', 'sqrt', 'abs', 'exp', 'log', 'asin', 'acos', 'atan'].forEach(fn => {
            s = s.replace(new RegExp(`\\b${fn}\\(`, 'g'), `Math.${fn}(`);
        });
        return s;
    },
    compile(formula) {
        try {
            const body = this.prepare(formula);
            const fn = new Function('x', `try { return ${body}; } catch(e) { return NaN; }`);
            fn(1); return fn;
        } catch (e) { return null; }
    }
};

const app = {
    canvas: document.getElementById('graphCanvas'),
    ctx: null,
    layers: [],
    zoom: 40, offset: { x: 0, y: 0 },
    mouse: { x: null, y: null, worldX: 0, worldY: 0 },
    isDragging: false,
    tooltip: document.getElementById('tooltip'),
    colors: ['#3b82f6', '#10b981', '#f43f5e', '#a855f7', '#f59e0b'],

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        this.canvas.addEventListener('wheel', e => this.handleWheel(e));
        this.canvas.addEventListener('mousedown', () => { this.isDragging = true; this.canvas.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { this.isDragging = false; this.canvas.style.cursor = 'crosshair'; });
        this.canvas.addEventListener('mousemove', e => this.handleMouseMove(e));
        this.canvas.addEventListener('mouseleave', () => { this.mouse.x = null; this.tooltip.style.display = 'none'; this.scheduleRender(); });

        document.getElementById('formulaInput').addEventListener('keypress', e => { if (e.key === 'Enter') this.addLayer(); });
        
        this.loadState();
    },

    saveState() {
        const formulas = this.layers.map(l => l.text);
        localStorage.setItem('graphpro_layers', JSON.stringify(formulas));
    },

    loadState() {
        try {
            const saved = JSON.parse(localStorage.getItem('graphpro_layers'));
            if (saved && saved.length > 0) {
                saved.forEach(f => this.addLayer(f, true));
            } else {
                this.addLayer("e^(-x/5) * sin(x)"); // Дефолтная красивая функция затухания
            }
        } catch (e) {
            this.addLayer("x^2");
        }
    },

    resize() {
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.canvas.width = rect.width; this.canvas.height = rect.height;
        this.scheduleRender();
    },

    addLayer(presetFormula, noSave = false) {
        const input = document.getElementById('formulaInput');
        const fText = presetFormula || input.value;
        if (!fText) return;

        const fn = SmartParser.compile(fText);
        if (fn) {
            const color = this.colors[this.layers.length % this.colors.length];
            this.layers.push({ id: Date.now() + Math.random(), text: fText, fn, color });
            this.updateUI();
            this.scheduleRender();
            if (!presetFormula) input.value = '';
            if (!noSave) this.saveState();
        } else {
            alert("Не удалось распознать формулу.");
        }
    },

    removeLayer(id) {
        this.layers = this.layers.filter(l => l.id !== id);
        this.updateUI();
        this.saveState();
        this.scheduleRender();
    },

    clear() {
        this.layers = [];
        this.updateUI();
        this.saveState();
        this.scheduleRender();
    },

    updateUI() {
        const list = document.getElementById('layersList');
        if (this.layers.length === 0) {
            list.innerHTML = '<div style="color:#52525b; font-size:0.9rem;">Пусто. Напишите формулу выше.</div>';
            return;
        }
        list.innerHTML = this.layers.map(l => `
            <div class="layer-item" style="border-color: ${l.color}">
                <code style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">y = ${l.text}</code>
                <button onclick="app.removeLayer(${l.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;">×</button>
            </div>
        `).join('');
    },

    toWorld(sX, sY) { return { x: (sX - this.canvas.width/2 - this.offset.x) / this.zoom, y: (this.canvas.height/2 - sY + this.offset.y) / this.zoom }; },
    toScreen(wX, wY) { return { x: wX * this.zoom + this.canvas.width/2 + this.offset.x, y: this.canvas.height/2 - wY * this.zoom + this.offset.y }; },

    handleWheel(e) {
        e.preventDefault();
        const delta = Math.sign(e.deltaY) * -0.1;
        const newZoom = this.zoom * (1 + delta);
        if (newZoom > 2 && newZoom < 5000) {
            const mw1 = this.toWorld(this.mouse.x || this.canvas.width/2, this.mouse.y || this.canvas.height/2);
            this.zoom = newZoom;
            const mw2 = this.toWorld(this.mouse.x || this.canvas.width/2, this.mouse.y || this.canvas.height/2);
            this.offset.x += (mw2.x - mw1.x) * this.zoom;
            this.offset.y -= (mw2.y - mw1.y) * this.zoom;
            this.scheduleRender();
        }
    },

    handleMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        this.mouse.x = e.clientX - rect.left;
        this.mouse.y = e.clientY - rect.top;

        if (this.isDragging) {
            this.offset.x += e.movementX; this.offset.y += e.movementY;
        }

        const world = this.toWorld(this.mouse.x, this.mouse.y);
        this.mouse.worldX = world.x; this.mouse.worldY = world.y;
        this.scheduleRender();
    },

    drawGrid() {
        const { ctx, canvas, zoom } = this;
        let step = zoom > 150 ? 0.2 : zoom > 50 ? 1 : zoom > 15 ? 5 : zoom > 5 ? 20 : 100;

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 1;

        const lW = this.toWorld(0, 0).x, rW = this.toWorld(canvas.width, 0).x;
        const tW = this.toWorld(0, 0).y, bW = this.toWorld(0, canvas.height).y;

        ctx.beginPath();
        for (let x = Math.floor(lW / step) * step; x <= rW; x += step) {
            const sx = this.toScreen(x, 0).x; ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height);
        }
        for (let y = Math.floor(bW / step) * step; y <= tW; y += step) {
            const sy = this.toScreen(0, y).y; ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy);
        }
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 2;
        const origin = this.toScreen(0, 0);
        ctx.beginPath();
        if (origin.y >= 0 && origin.y <= canvas.height) { ctx.moveTo(0, origin.y); ctx.lineTo(canvas.width, origin.y); }
        if (origin.x >= 0 && origin.x <= canvas.width) { ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, canvas.height); }
        ctx.stroke();

        ctx.fillStyle = '#71717a'; ctx.font = '12px monospace';
        if (origin.y >= 0 && origin.y <= canvas.height) {
            for (let x = Math.floor(lW / step) * step; x <= rW; x += step) {
                if (Math.abs(x) > 0.001) ctx.fillText(parseFloat(x.toFixed(2)), this.toScreen(x, 0).x + 5, origin.y + 15);
            }
        }
    },

    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawGrid();

        this.layers.forEach(layer => {
            this.ctx.beginPath();
            this.ctx.strokeStyle = layer.color;
            this.ctx.lineWidth = 2.5;

            let first = true, prevScreenY = 0;
            for (let screenX = 0; screenX <= this.canvas.width; screenX += 2) {
                const worldY = layer.fn(this.toWorld(screenX, 0).x);
                const screenY = this.toScreen(0, worldY).y;

                if (isNaN(screenY)) { first = true; continue; }
                if (!first && Math.abs(screenY - prevScreenY) > this.canvas.height) first = true;

                if (first) { this.ctx.moveTo(screenX, screenY); first = false; } 
                else { this.ctx.lineTo(screenX, screenY); }
                prevScreenY = screenY;
            }
            this.ctx.stroke();
        });

        if (this.mouse.x !== null && !this.isDragging) this.drawTrackers();
    },

    drawTrackers() {
        const wX = this.mouse.worldX, sX = this.mouse.x;
        
        this.ctx.beginPath();
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        this.ctx.lineWidth = 1;
        this.ctx.moveTo(sX, 0); this.ctx.lineTo(sX, this.canvas.height);
        this.ctx.stroke();

        let tooltipHTML = `<div style="border-bottom:1px solid #3f3f46; padding-bottom:6px; margin-bottom:6px;">x = ${wX.toFixed(3)}</div>`;
        let hasPoints = false;

        this.layers.forEach(layer => {
            const wY = layer.fn(wX);
            if (!isNaN(wY)) {
                const sY = this.toScreen(0, wY).y;
                
                // Вычисление производной (численный метод: f(x+h) - f(x-h) / 2h)
                const h = 0.0001;
                const slope = (layer.fn(wX + h) - layer.fn(wX - h)) / (2 * h);
                
                // Отрисовка касательной (тангенса)
                if (sY >= 0 && sY <= this.canvas.height) {
                    const tangentLength = 60; // Длина линии в пикселях на экране
                    // Переводим угол наклона на экран
                    const screenSlope = -slope; // Минус, потому что ось Y на экране перевернута
                    const angle = Math.atan(screenSlope);
                    
                    this.ctx.beginPath();
                    this.ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`;
                    this.ctx.setLineDash([4, 4]); // Пунктир
                    this.ctx.moveTo(sX - Math.cos(angle)*tangentLength, sY - Math.sin(angle)*tangentLength);
                    this.ctx.lineTo(sX + Math.cos(angle)*tangentLength, sY + Math.sin(angle)*tangentLength);
                    this.ctx.stroke();
                    this.ctx.setLineDash([]); // Возвращаем сплошную линию

                    this.ctx.beginPath();
                    this.ctx.fillStyle = layer.color;
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2;
                    this.ctx.arc(sX, sY, 5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.stroke();
                }

                tooltipHTML += `<div class="tooltip-row" style="color: ${layer.color}">y = ${wY.toFixed(3)} <span class="tangent-info">dy/dx ≈ ${slope.toFixed(2)}</span></div>`;
                hasPoints = true;
            }
        });

        if (hasPoints) {
            this.tooltip.innerHTML = tooltipHTML;
            this.tooltip.style.display = 'block';
            
            let tipX = this.mouse.x + 20, tipY = this.mouse.y + 20;
            if (tipX + this.tooltip.offsetWidth > this.canvas.width) tipX = this.mouse.x - this.tooltip.offsetWidth - 20;
            if (tipY + this.tooltip.offsetHeight > this.canvas.height) tipY = this.mouse.y - this.tooltip.offsetHeight - 20;
            
            this.tooltip.style.left = tipX + 'px'; this.tooltip.style.top = tipY + 'px';
        } else {
            this.tooltip.style.display = 'none';
        }
    },

    scheduleRender() {
        if (!this.renderPending) {
            this.renderPending = true;
            requestAnimationFrame(() => { this.render(); this.renderPending = false; });
        }
    },

    resetView() { this.zoom = 40; this.offset = { x: 0, y: 0 }; this.scheduleRender(); }
};

app.init();
</script>
</body>
</html>
